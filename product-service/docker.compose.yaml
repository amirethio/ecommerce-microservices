version: "3.8"

services:
  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/product
    depends_on:
      - postgres
    networks:
      - product-network

  postgres:
    image: postgres:15.4
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=product
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - product-network

networks:
  product-network:
    driver: bridge

volumes:
  postgres-data:
